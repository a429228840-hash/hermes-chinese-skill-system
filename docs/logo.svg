<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bg)"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Chinese characters 中文 -->
  <text x="100" y="90" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold">中文</text>
  <!-- HN (Hermes CN) -->
  <text x="100" y="135" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="monospace" font-size="24" font-weight="bold">HN</text>
  <!-- Decorative dots -->
  <circle cx="50" cy="50" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="150" cy="50" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="50" cy="150" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="150" cy="150" r="3" fill="rgba(255,255,255,0.4)"/>
</svg>
